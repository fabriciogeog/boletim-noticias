services:
  # ========================================
  # Backend API - FastAPI (Leve)
  # ========================================
  api:
    build: ./backend
    container_name: boletim-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
      - ./data:/app/data
      - ./audio:/app/audio
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      
    networks:
      - boletim-network
    restart: unless-stopped
    healthcheck:
      # O comando abaixo usa o Python para tentar abrir a URL de configuração da API
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/config')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
  # ========================================
  # Frontend - Nginx
  # ========================================
  frontend:
    build: ./frontend
    container_name: boletim-frontend
    ports:
      - "3001:80"
    volumes:
       - ./frontend/src:/usr/share/nginx/html:ro
       - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"    # ← adicionar esta linha
    depends_on:
      - api
    networks:
      - boletim-network
    restart: unless-stopped

networks:
  boletim-network:
    driver: bridge

volumes:
  data:
  audio:
