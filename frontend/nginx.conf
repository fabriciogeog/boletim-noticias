server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Frontend estático
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Backend FastAPI (Docker interno)
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Áudio via backend
    location /audio/ {
        proxy_pass http://api:8000;
    }

    # Interface do locutor — /chat e /status
    # Resolve o CORS: tudo na mesma origem (porta 3001)
    location /chat {
        proxy_pass http://host.docker.internal:5000/chat;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 10s;
        proxy_read_timeout 360s;
    }

    location /llm-status {
        proxy_pass http://host.docker.internal:5000/status;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
    }
}